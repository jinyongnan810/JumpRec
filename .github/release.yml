name: Release

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - keep

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep -m1 "MARKETING_VERSION" JumpRec.xcodeproj/project.pbxproj \
            | sed 's/.*= //;s/;//;s/[[:space:]]//g')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Bump version in project.pbxproj
        if: inputs.action != 'keep'
        id: bump
        run: |
          NEW_VERSION=$(python3 .github/scripts/bump_version.py "${{ inputs.action }}")
          echo "new_version=$(echo "$NEW_VERSION" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | tail -1)" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: inputs.action != 'keep'
        run: |
          git add JumpRec.xcodeproj/project.pbxproj
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin develop

      - name: Fast-forward merge develop → main
        run: |
          git fetch origin main
          git checkout main
          git merge --ff-only origin/develop
          git push origin main

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ inputs.action }}" = "keep" ]; then
            # Re-use the latest existing tag
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LATEST" ]; then
              echo "No existing tag found; cannot use 'keep' without a previous release tag."
              exit 1
            fi
            echo "name=$LATEST" >> "$GITHUB_OUTPUT"
            echo "Tag to re-create: $LATEST"
          else
            TAG="v${{ steps.bump.outputs.new_version }}"
            echo "name=$TAG" >> "$GITHUB_OUTPUT"
            echo "New tag: $TAG"
          fi

      - name: Delete existing release and tag (keep)
        if: inputs.action == 'keep'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          # Remove GitHub release (ignore errors if it doesn't exist)
          gh release delete "$TAG" --yes 2>/dev/null || true
          # Remove remote tag
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          # Remove local tag
          git tag -d "$TAG" 2>/dev/null || true
          echo "Deleted release/tag: $TAG"

      - name: Create release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --latest
          echo "Created release: $TAG"
